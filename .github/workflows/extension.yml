name: Extension Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest
        run: python -m json.tool manifest.json >/dev/null

      - name: Build unpacked extension
        run: |
          rm -rf dist
          mkdir -p dist
          cp -R manifest.json background content icons lib options popup dist/

      - name: Create Chrome Web Store zip
        run: |
          (cd dist && zip -qr ../quizme-chrome.zip .)

      - name: Upload extension package
        uses: actions/upload-artifact@v4
        with:
          name: quizme-package
          path: |
            dist/
            quizme-chrome.zip
